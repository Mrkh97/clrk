name: clrk_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  camera: ^0.12.0+1
  cookie_jar: ^4.0.8
  dio: ^5.9.2
  dio_cookie_manager: ^3.3.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_native_splash: ^2.4.6
  forui: ^0.21.1
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  hooks_riverpod: ^3.3.1
  image_picker: ^1.2.1
  riverpod_annotation: ^4.0.2
  talker: ^5.1.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#101113"
  color_dark: "#101113"
  fullscreen: true
  android: true
  ios: true
  web: false
  android_12:
    color: "#101113"
    color_dark: "#101113"
